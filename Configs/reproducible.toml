[run]
seed = 42
output_dir = "./runs/reproducible"
log_level = "INFO"
deterministic = true

[model]
channels = 128
blocks = 16
heads = ["policy", "value"]

[selfplay]
num_workers = 24
games_per_epoch = 4096
states_per_epoch = 400000
batch_size_per_worker = 8
mcts_simulations = 800
c_puct = 1.5
c_puct_init = 19652.0
temperature_schedule = [[0, 1.0], [30, 0.0]]
dirichlet_alpha = 0.3
dirichlet_fraction = 0.25
pcr_low_sim_prob = 0.75
pcr_low_sims = 192

[inference]
max_batch_size = 128
max_wait_us = 200
fp16 = true
ema_update_every = 100

[buffer]
capacity = 2000000
recency_decay = 0.99
pcr_weight = 0.25
regret_fraction = 0.08

[train]
batch_size = 256
batches_per_epoch = 2000
optimizer = "adamw"
lr_schedule = "cosine"
peak_lr = 0.003
loss_weights = { policy = 1.0, value = 1.5 }
