name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Run release fast tests
        run: cargo test --workspace --release

      - name: Clippy workspace
        run: cargo clippy --workspace --release -- -D warnings

  deep-oracle:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run ignored oracle tests
        run: cargo test --workspace --release -- --ignored --test-threads=1

  python-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install maturin
          python -m pip install -e "Python[dev]"

      - name: Build and install extension
        run: |
          . .venv/bin/activate
          maturin develop --manifest-path crates/hexgame-py/Cargo.toml --features python

      - name: Run V2 Python shard
        run: |
          . .venv/bin/activate
          pytest \
            Python/tests/contracts \
            Python/tests/engine \
            Python/tests/models \
            Python/tests/inference \
            Python/tests/search \
            Python/tests/replay \
            Python/tests/train \
            Python/tests/eval \
            Python/tests/tuning \
            Python/tests/dashboard \
            Python/tests/phase09 \
            -q

      - name: Upload Python policy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-v2-policy-artifacts
          path: Docs/refactor/artifacts/phase_09/import_audits/

  architecture-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run Phase 09 architecture policy audit
        run: python tools/refactor/phase09_policy_audit.py --output Docs/refactor/artifacts/phase_09/import_audits/phase09_policy_audit.json

      - name: Upload architecture policy audit
        uses: actions/upload-artifact@v4
        with:
          name: phase09-architecture-policy
          path: Docs/refactor/artifacts/phase_09/import_audits/phase09_policy_audit.json

  dashboard-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Python/dashboard_frontend/package-lock.json

      - name: Install dashboard dependencies
        working-directory: Python/dashboard_frontend
        run: npm ci

      - name: Build dashboard frontend
        working-directory: Python/dashboard_frontend
        run: npm run build

  final-v2-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install maturin
          python -m pip install -e "Python[dev]"

      - name: Build and install extension
        run: |
          . .venv/bin/activate
          maturin develop --manifest-path crates/hexgame-py/Cargo.toml --features python

      - name: Generate final smoke bundle
        run: |
          . .venv/bin/activate
          python tools/refactor/phase09_final_smoke.py --output-dir Docs/refactor/artifacts/phase_09/final_smoke
          python tools/refactor/phase09_performance_probe.py --output Docs/refactor/artifacts/phase_09/performance/performance_comparison.json
          python tools/refactor/phase09_artifact_validator.py Docs/refactor/artifacts/phase_09 --output Docs/refactor/artifacts/phase_09/verification/artifact_validation_report.json

      - name: Upload final V2 smoke bundle
        uses: actions/upload-artifact@v4
        with:
          name: phase09-final-v2-smoke
          path: Docs/refactor/artifacts/phase_09/
